name: Bug report
description: Report a reproducible product, CLI, plugin, or UI defect.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not attach private outreach notes, unpublished applicant data, or private source exports.
  - type: input
    id: version
    attributes:
      label: Version
      description: Release version or commit SHA.
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - CLI
        - Codex plugin / skill
        - Workspace schema
        - Web UI
        - XLSX export
        - Documentation
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include commands and a minimal redacted workspace shape when relevant.
      placeholder: |
        1. path-to-academia init /tmp/repro --example empty
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Python:
        Browser, if UI-related:

