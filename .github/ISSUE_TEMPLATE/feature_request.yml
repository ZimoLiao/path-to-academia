name: Feature request
description: Propose a general capability for academic opportunity research workflows.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the reusable workflow gap, not only one private project need.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain what an agent or user should be able to do.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and examples
      description: Link public examples or describe redacted source shapes.
  - type: checkboxes
    id: boundaries
    attributes:
      label: Design boundaries
      options:
        - label: This can remain domain-configurable.
        - label: This does not require storing private outreach state in fact tables.
        - label: This does not treat missing enrichment as negative evidence.

